name: Weekly PageSpeed Audit

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      strategy:
        description: "Lighthouse strategy"
        required: false
        default: "mobile"
        type: choice
        options:
          - mobile
          - desktop

permissions:
  contents: write

jobs:
  audit:
    name: Run PageSpeed Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run audit
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          STRATEGY: ${{ inputs.strategy || 'mobile' }}
        run: node audit.js

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: weekly PageSpeed report $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
